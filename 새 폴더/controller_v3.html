<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>외부 컨트롤러 (V-World 연동)</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; background: #222; color: white; }
        #sidebar { width: 350px; padding: 25px; background: #333; box-shadow: 2px 0 5px rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; display: flex; flex-direction: column; }
        #map { flex-grow: 1; height: 100%; z-index: 1; }
        
        h2 { margin-top: 0; font-size: 22px; margin-bottom: 10px; color: #fff;}
        p.desc { font-size: 13px; color: #aaa; margin-bottom: 20px; line-height: 1.4; }
        
        label { font-size: 13px; margin-bottom: 6px; display: block; color: #ccc; font-weight: bold; }
        input[type=text], input[type=number], select { width: 100%; margin-bottom: 15px; padding: 12px; box-sizing: border-box; background: #111; border: 1px solid #555; color: white; border-radius: 6px; font-family: monospace;}
        input:focus, select:focus { outline: none; border-color: #E34F26; }
        
        .checkbox-container { display: flex; align-items: center; margin-bottom: 15px; font-size: 14px; color: #ddd; }
        .checkbox-container input { margin-right: 8px; width: 18px; height: 18px; }

        .info-box { background: #222; padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; color: #ccc; border: 1px solid #444; text-align: center; }
        .info-box span { color: #4CAF50; font-weight: bold; font-size: 20px; display: inline-block; margin-top: 5px; }
        
        button { width: 100%; padding: 15px; background: #555; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: not-allowed; transition: 0.2s; margin-bottom: 10px; }
        button.active { background: #E34F26; cursor: pointer; box-shadow: 0 4px 6px rgba(227, 79, 38, 0.3); }
        button.active:hover { background: #ff5e33; transform: translateY(-1px); }
        button.active:active { transform: translateY(1px); }
        
        #log { font-size: 13px; font-weight: bold; min-height: 20px; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>🌐 V-World 컨트롤러</h2>
        <p class="desc">지도에서 기준점을 클릭하면 선택한 반경 내의 건물(면)과 도로(선) 데이터를 추출합니다.</p>
        
        <label>V-World 인증키 (API Key)</label>
        <input type="text" id="apiKey" value="65A66471-B13B-3834-9402-4FF6681FDF22" placeholder="API Key 입력">
        
        <label>추출 반경 (m)</label>
        <select id="radius">
            <option value="0">단일 객체 (클릭점)</option>
            <option value="50">반경 50m</option>
            <option value="100" selected>반경 100m</option>
            <option value="200">반경 200m</option>
            <option value="500">반경 500m</option>
        </select>
        
        <div class="checkbox-container" style="margin-top:10px;">
            <input type="checkbox" id="fetchRoads" checked>
            <label for="fetchRoads" style="margin:0; font-weight:normal;">도로망 정보(선) 같이 추출하기</label>
        </div>

        <div class="info-box">
            선택된 건물: <span id="selectedCount" style="font-size:16px;">0개</span><br>
            선택된 도로: <span id="selectedRoads" style="font-size:16px;">0개</span>
        </div>

        <hr style="border-color: #444; margin: 0 0 15px 0;">
        <h3 style="margin-top:0; color:#2196F3; font-size:16px;">✨ AI 프롬프트 명령</h3>
        <p class="desc" style="margin-bottom:10px;">자연어로 명령하면 건물이 자동으로 설정됩니다.</p>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="aiPrompt" placeholder='예: "스타벅스 상가 가로 15 세로 20 2층으로 지어줘"' style="flex:1; margin-bottom:0; font-family:sans-serif; background:#2b2b2b; color:#fff; border:1px solid #777; padding:8px; border-radius:4px; outline:none;">
            <button onclick="parseAIPrompt()" style="width:auto; padding:0 15px; background:#9C27B0; margin-bottom:0; border:none; border-radius:4px; color:white; font-weight:bold; cursor:pointer;">⚡ 분석</button>
        </div>

        <h3 style="margin-top:0; color:#4CAF50; font-size:14px;">🏗️ 제원 상세 조정</h3>
        
        <div style="display:flex; gap:10px; margin-bottom:0px;">
            <div style="flex:1;">
                <label>건물명</label>
                <input type="text" id="customName" value="신규 프로젝트" style="padding:10px; margin-bottom:10px;">
            </div>
            <div style="flex:1;">
                <label>용도</label>
                <select id="customUsage" style="padding:10px; margin-bottom:10px;">
                    <option value="주거용">🏠 주거</option>
                    <option value="상업용" selected>🏢 상업</option>
                    <option value="공공용">🏛️ 공공</option>
                    <option value="공업용">🏭 공업</option>
                </select>
            </div>
        </div>

        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <div style="flex:1;">
                <label>가로(m)</label>
                <input type="number" id="customWidth" value="20" style="padding:8px; margin-bottom:0;">
            </div>
            <div style="flex:1;">
                <label>세로(m)</label>
                <input type="number" id="customDepth" value="30" style="padding:8px; margin-bottom:0;">
            </div>
            <div style="flex:1;">
                <label>층수</label>
                <input type="number" id="customFloors" value="5" style="padding:8px; margin-bottom:0;">
            </div>
            <div style="flex:1;">
                <label>각도(도)</label>
                <input type="number" id="customAngle" value="0" style="padding:8px; margin-bottom:0;">
            </div>
        </div>
        
        <button id="addCustomBtn" onclick="toggleCustomMode()" style="background:#2196F3; margin-bottom:20px;">📌 맵에 클릭하여 배치 모드</button>
        <hr style="border-color: #444; margin: 0 0 15px 0;">

        <button onclick="goToMergedApp()" style="background:#8B5CF6; margin-bottom:10px; color:white; border:none; padding:15px; border-radius:6px; font-weight:bold; cursor:pointer; width:100%;">🚀 AI 건축 비주얼라이저로 전송 (merged_app.html)</button>
        <button onclick="sendCommand()" id="sendBtn" disabled>스케치업으로 전체 전송 🚀</button>
        <p id="log"></p>
        
        <div style="margin-top: auto; font-size: 11px; color: #666; text-align: center;">
            * 대형 반경은 로딩에 시간이 걸릴 수 있습니다.
        </div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let currentBuildings = []; 
        let currentRoads = []; 
        let currentPolygonLayers = []; 
        let currentClickLng = 0;
        let currentClickLat = 0;

        const map = L.map('map').setView([37.5665, 126.9780], 17);
        
        function getVworldTileUrl() {
            const key = document.getElementById('apiKey').value || '65A66471-B13B-3834-9402-4FF6681FDF22';
            return `https://api.vworld.kr/req/wmts/1.0.0/${key}/Base/{z}/{y}/{x}.png`;
        }
        
        let vworldLayer = L.tileLayer(getVworldTileUrl(), {
            maxZoom: 19,
            attribution: 'Map data &copy; V-World'
        }).addTo(map);

        document.getElementById('apiKey').addEventListener('change', () => {
            vworldLayer.setUrl(getVworldTileUrl());
        });

        // JSONP 요청 헬퍼
        function fetchJSONP(url) {
            return new Promise((resolve, reject) => {
                const callbackName = 'vworld_cb_' + Math.round(1000000 * Math.random());
                window[callbackName] = function(json) {
                    delete window[callbackName];
                    resolve(json);
                };
                const script = document.createElement('script');
                script.src = url + '&format=json&errorFormat=json&callback=' + callbackName;
                script.onerror = () => reject(new Error("Network Error"));
                script.onload = () => document.body.removeChild(script);
                document.body.appendChild(script);
            });
        }
        
        // 자연어 기반 AI 프롬프트 파서 (Lightweight RegEx NLP)
        function parseAIPrompt() {
            const prompt = document.getElementById('aiPrompt').value.trim();
            if (!prompt) return showLog("프롬프트를 입력해주세요.", "#E34F26");

            let parsedName = "신규 프로젝트";
            let parsedUsage = "상업용";
            let parsedWidth = 20;
            let parsedDepth = 30;
            let parsedFloors = 5;
            let parsedAngle = 0;

            if (/주거|아파트|주택|빌라/.test(prompt)) parsedUsage = "주거용";
            else if (/공공|학교|주민센터|관공서|우체국|경찰서/.test(prompt)) parsedUsage = "공공용";
            else if (/공업|공장|창고|물류/.test(prompt)) parsedUsage = "공업용";
            else if (/상업|상가|빌딩|마트|스벅|스타벅스|편의점|카페|식당/.test(prompt)) parsedUsage = "상업용";

            const widthMatch = prompt.match(/(?:가로|폭|너비)[\s은는]*(\d+)/);
            const depthMatch = prompt.match(/(?:세로|깊이)[\s은는]*(\d+)/);
            const sizeMatch = prompt.match(/(\d+)[\s]*[xX\*에곱하기][\s]*(\d+)/); 
            const pyMatch = prompt.match(/(\d+)평/); 
            
            if (widthMatch) parsedWidth = parseInt(widthMatch[1]);
            else if (sizeMatch) parsedWidth = parseInt(sizeMatch[1]);
            else if (pyMatch) {
                const sqm = parseInt(pyMatch[1]) * 3.3058;
                parsedWidth = Math.round(Math.sqrt(sqm));
                parsedDepth = parsedWidth;
            }
            
            if (depthMatch) parsedDepth = parseInt(depthMatch[1]);
            else if (sizeMatch) parsedDepth = parseInt(sizeMatch[2]);

            const floorMatch = prompt.match(/(\d+)층/);
            if (floorMatch) parsedFloors = parseInt(floorMatch[1]);

            const angleMatch = prompt.match(/(\d+)도/) || prompt.match(/(?:회전|각도)[\s은는]*(\d+)/);
            if (angleMatch) parsedAngle = parseInt(angleMatch[1]);

            const nameQuote = prompt.match(/['"「『](.*?)['"」』]/);
            if (nameQuote) {
                parsedName = nameQuote[1];
            } else {
                const words = prompt.split(/\s+/);
                const excludeWords = /가로|세로|폭|깊이|층|도|회전|각도|상업|주거|공공|공업|만들어|지어|생성|해줘|건물/;
                for (let w of words) {
                    if (!excludeWords.test(w) && isNaN(parseInt(w)) && w.length > 0) {
                        parsedName = w.replace(/[은는이가을를으로만조차]/g, ''); 
                        break;
                    }
                }
            }

            document.getElementById('customName').value = parsedName;
            document.getElementById('customUsage').value = parsedUsage;
            document.getElementById('customWidth').value = parsedWidth;
            document.getElementById('customDepth').value = parsedDepth;
            document.getElementById('customFloors').value = parsedFloors;
            document.getElementById('customAngle').value = parsedAngle;
            
            showLog(`🤖 AI 생성준비: ${parsedName} (${parsedWidth}x${parsedDepth}m, ${parsedFloors}층)`, "#9C27B0");
            
            // 자동으로 맵 배치 모드 켜기
            if (!isCustomMode) {
                toggleCustomMode();
            }
        }

        // 커스텀 건물 배치 모드 제어
        let isCustomMode = false;
        function toggleCustomMode() {
            isCustomMode = !isCustomMode;
            const btn = document.getElementById('addCustomBtn');
            if (isCustomMode) {
                btn.style.background = '#E34F26';
                btn.innerText = "취소 (일반지도 모드로 복귀)";
                map._container.style.cursor = 'crosshair';
                showLog("지도에서 건물을 세울 위치를 클릭하세요.", "#FFEB3B");
            } else {
                btn.style.background = '#2196F3';
                btn.innerText = "📌 맵에 클릭하여 배치 모드";
                map._container.style.cursor = '';
            }
        }

        map.on('click', async (e) => {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) return showLog("V-World API Key를 입력해주세요.", "#E34F26");

            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            
            if (isCustomMode) {
                const w = parseFloat(document.getElementById('customWidth').value) || 10;
                const d = parseFloat(document.getElementById('customDepth').value) || 10;
                const flrs = parseFloat(document.getElementById('customFloors').value) || 1;
                const ang = parseFloat(document.getElementById('customAngle').value) || 0;
                const name = document.getElementById('customName').value || "사용자 건물";
                const usage = document.getElementById('customUsage').value || "상업용";
                const hNum = flrs * 3.0;

                const angleRad = ang * Math.PI / 180;
                const cosA = Math.cos(angleRad);
                const sinA = Math.sin(angleRad);
                
                // 가로 세로 중심점 기준 좌표 (m)
                const pts = [
                    [-w/2, -d/2], [w/2, -d/2], [w/2, d/2], [-w/2, d/2]
                ];
                
                const R = 6378137; // 지구 반지름
                const coords = pts.map(pt => {
                    const rx = pt[0] * cosA - pt[1] * sinA;
                    const ry = pt[0] * sinA + pt[1] * cosA;
                    const dLngStr = rx / (R * Math.cos(lat * Math.PI / 180)) * (180 / Math.PI);
                    const dLatStr = ry / R * (180 / Math.PI);
                    return [lng + dLngStr, lat + dLatStr];
                });

                currentBuildings.push({ coords: coords, height: hNum, name: name, usage: usage });
                
                const polyCoords = coords.map(c => [c[1], c[0]]);
                const poly = L.polygon(polyCoords, {color: '#2196F3', weight: 3, fillColor: '#2196F3', fillOpacity: 0.8}).addTo(map);
                currentPolygonLayers.push(poly);
                
                if (currentClickLng === 0) {
                    currentClickLng = lng;
                    currentClickLat = lat;
                }
                
                toggleCustomMode();
                document.getElementById('selectedCount').innerText = currentBuildings.length + "개";
                enableButton();
                showLog(`✅ '${name}' 맵 배치 완료!`, "#4CAF50");
                return; // 공간 쿼리로 넘어가지 않음
            }

            // 일반 V-World 공간 쿼리 모드
            currentClickLng = lng; 
            currentClickLat = lat;
            
            // 기존 레이어 및 데이터 초기화 (일반 모드에서만 초기화)
            currentPolygonLayers.forEach(layer => map.removeLayer(layer));
            currentPolygonLayers = [];
            currentBuildings = [];
            currentRoads = [];
            disableButton();

            // 반경 계산 및 공간 쿼리 (geomFilter) 
            const radius = parseInt(document.getElementById('radius').value);
            let filterStr = `POINT(${lng} ${lat})`;
            if (radius > 0) {
                const dLat = radius / 111320;
                const dLng = radius / (111320 * Math.cos(lat * Math.PI / 180));
                filterStr = `BOX(${lng - dLng},${lat - dLat},${lng + dLng},${lat + dLat})`;
            }

            let domain = window.location.hostname || window.location.host;
            if (!domain) domain = 'localhost';
            
            showLog("데이터 목록 조회 중...", "#ccc");
            
            try {
                // 1. 건물통합정보(LT_C_BSI) 우선 조회
                let buildingFeatures = [];
                try {
                    const bsiUrl = `https://api.vworld.kr/req/data?service=data&version=2.0&request=GetFeature&data=LT_C_BSI&key=${apiKey}&domain=http://${domain}&geomFilter=${filterStr}&crs=EPSG:4326&size=1000`;
                    const bsiData = await fetchJSONP(bsiUrl);
                    if (bsiData.response && bsiData.response.status === "OK" && bsiData.response.result) {
                        buildingFeatures = bsiData.response.result.featureCollection.features || [];
                    }
                } catch(e) {
                    console.log("LT_C_BSI Failed, fallback to LT_C_SPBD");
                }
                
                // 조회 실패 시, 국가공간정보(LT_C_SPBD)로 폴백(Fallback)
                if (buildingFeatures.length === 0) {
                    const spbdUrl = `https://api.vworld.kr/req/data?service=data&version=2.0&request=GetFeature&data=LT_C_SPBD&key=${apiKey}&domain=http://${domain}&geomFilter=${filterStr}&crs=EPSG:4326&size=1000`;
                    const spbdData = await fetchJSONP(spbdUrl);
                    if (spbdData.response && spbdData.response.status === "OK" && spbdData.response.result) {
                        buildingFeatures = spbdData.response.result.featureCollection.features || [];
                    }
                }

                if (buildingFeatures.length > 0) {
                    buildingFeatures.forEach(feature => {
                        let hNum = 10;
                        let floorsNum = 3;
                        const props = feature.properties;
                        
                        // 높이값 매핑
                        const hght = props.buld_hght || props.hght || props.height || props.bd_hg || props.BD_HG;
                        const floors = props.grnd_flr || props.gro_flo_co || props.ground_flr || props.flr_co || props.GRO_FLO_CO;
                        
                        if (hght && parseFloat(hght) > 0) {
                            hNum = parseFloat(hght);
                        } else if (floors && parseInt(floors) > 0) {
                            hNum = parseInt(floors) * 3.0; // 층당 3m
                        }
                        
                        if (floors && parseInt(floors) > 0) {
                            floorsNum = parseInt(floors);
                        } else if (hght && parseFloat(hght) > 0) {
                            floorsNum = Math.max(1, Math.round(parseFloat(hght) / 3.0));
                        }
                        
                        // 건물명 및 용도명 추출
                        const bName = props.buld_nm || props.bd_nm || props.bld_nm || props.BULD_NM || "무명 건물";
                        const bUsage = props.bdtyp_nm || props.bemd_prpos_nm || props.prpos_nm || props.main_purps_nm || props.MAIN_PURPS_NM || "분류없음";
                        
                        const geom = feature.geometry;
                        if (!geom) return;
                        
                        let coords = [];
                        if (geom.type === "MultiPolygon") coords = geom.coordinates[0][0];
                        else if (geom.type === "Polygon") coords = geom.coordinates[0];

                        if (coords && coords.length >= 3) {
                            // currentBuildings에 floors 속성 함께 추가
                            currentBuildings.push({ 
                                coordinates: coords, 
                                height: hNum, 
                                floors: floorsNum,
                                name: bName, 
                                usage: bUsage 
                            });
                            const polyCoords = coords.map(c => [c[1], c[0]]);
                            const poly = L.polygon(polyCoords, {color: '#E34F26', weight: 1, fillColor: '#E34F26', fillOpacity: 0.5}).addTo(map);
                            currentPolygonLayers.push(poly);
                        }
                    });
                }

                // 2. 도로 데이터 조회 (LT_L_SPRD)
                const includeRoads = document.getElementById('fetchRoads') ? document.getElementById('fetchRoads').checked : false;
                if (includeRoads) {
                    const roadUrl = `https://api.vworld.kr/req/data?service=data&version=2.0&request=GetFeature&data=LT_L_SPRD&key=${apiKey}&domain=http://${domain}&geomFilter=${filterStr}&crs=EPSG:4326&size=1000`;
                    const roadData = await fetchJSONP(roadUrl);
                    
                    if (roadData.response && roadData.response.status === "OK" && roadData.response.result) {
                        const rFeatures = roadData.response.result.featureCollection.features;
                        if (rFeatures) {
                            rFeatures.forEach(feature => {
                                const geom = feature.geometry;
                                let lines = [];
                                if (geom.type === "MultiLineString") lines = geom.coordinates;
                                else if (geom.type === "LineString") lines = [geom.coordinates];

                                lines.forEach(lineCoords => {
                                    if (lineCoords && lineCoords.length >= 2) {
                                        currentRoads.push({ coordinates: lineCoords });
                                        const polyCoords = lineCoords.map(c => [c[1], c[0]]);
                                        const polyline = L.polyline(polyCoords, {color: '#4CAF50', weight: 4, opacity: 0.8}).addTo(map);
                                        currentPolygonLayers.push(polyline);
                                    }
                                });
                            });
                        }
                    }
                }

                if (currentBuildings.length === 0 && currentRoads.length === 0) {
                     showLog("선택 영역 내에 조회된 데이터가 없습니다.", "#E34F26");
                } else {
                    document.getElementById('selectedCount').innerText = currentBuildings.length + "개";
                    document.getElementById('selectedRoads').innerText = currentRoads.length + "개";
                    enableButton();
                    showLog(`검색 완료! (건물: ${currentBuildings.length}, 도로: ${currentRoads.length})`, "#4CAF50");
                }
            } catch (error) {
                console.error("API Call Error:", error);
                showLog("데이터 통신 에러 발생", "#E34F26");
            }
        });

        // 스케치업으로 보낼 수 있도록 기준점(클릭포인트) 대비 수백 개 건물의 로컬 M 좌표 일괄 계산
        function convertToLocalMetersList(geoArray, originLng, originLat) {
            const R = 6378137;
            return geoArray.map(item => {
                const localCoords = item.coordinates.map(pt => {
                    const x = (pt[0] - originLng) * (Math.PI / 180) * R * Math.cos(originLat * Math.PI / 180);
                    const y = (pt[1] - originLat) * (Math.PI / 180) * R;
                    return [x, y];
                });
                return { 
                    coordinates: localCoords, 
                    height: item.height || 0,
                    floors: item.floors || 1,
                    name: item.name || "",
                    usage: item.usage || ""
                };
            });
        }

        async function sendCommand() {
            if (currentBuildings.length === 0 && currentRoads.length === 0) return;

            // 좌표 변환
            const localBuildings = convertToLocalMetersList(currentBuildings, currentClickLng, currentClickLat);
            const localRoads = convertToLocalMetersList(currentRoads, currentClickLng, currentClickLat);
            
            // 반경(m) 가져오기
            const radius = parseInt(document.getElementById('radius').value) || 200;
            const apiKey = document.getElementById('apiKey').value;
            let domain = window.location.hostname || window.location.host;
            if (!domain) domain = 'localhost';

            // 바닥면 2D 위성지도 이미지 (WMS) 데이터를 위한 계산
            let mapPayload = null;
            let zoom = radius >= 500 ? 17 : 18;
            const resolution = (156543.03392 * Math.cos(currentClickLat * Math.PI / 180)) / Math.pow(2, zoom);
            
            const imgSizePx = 1024;
            const widthInMeters = imgSizePx * resolution;
            const heightInMeters = imgSizePx * resolution;

            const imgUrl = `https://api.vworld.kr/req/image?service=image&request=getmap&key=${apiKey}&basemap=GRAPHIC&center=${currentClickLng},${currentClickLat}&crs=epsg:4326&zoom=${zoom}&size=${imgSizePx},${imgSizePx}&format=jpeg&domain=http://${domain}`;
            
            const originX = -widthInMeters / 2.0;
            const originY = -heightInMeters / 2.0;

            mapPayload = {
                url: imgUrl,
                width: widthInMeters,
                height: heightInMeters,
                origin: [originX, originY, -1.0] 
            };

            // 3D 지형 (DEM) 생성을 위한 Open-Meteo API 표고 데이터 10x10 그리드 수집
            let terrainPayload = null;
            try {
                const gridSize = 10;
                const gridLats = [];
                const gridLngs = [];
                const gridPoints = [];
                
                const R = 6378137;
                const dLatStr = (heightInMeters / 2) / R * (180 / Math.PI);
                const dLngStr = (widthInMeters / 2) / (R * Math.cos(currentClickLat * Math.PI / 180)) * (180 / Math.PI);
                
                const minLng = currentClickLng - dLngStr;
                const maxLng = currentClickLng + dLngStr;
                const minLat = currentClickLat - dLatStr;
                const maxLat = currentClickLat + dLatStr;

                const stepLng = (maxLng - minLng) / (gridSize - 1);
                const stepLat = (maxLat - minLat) / (gridSize - 1);

                for (let i = 0; i < gridSize; i++) {
                    for (let j = 0; j < gridSize; j++) {
                        const glng = minLng + j * stepLng;
                        const glat = minLat + i * stepLat;
                        gridLngs.push(glng.toFixed(6));
                        gridLats.push(glat.toFixed(6));
                        
                        const dx = (glng - currentClickLng) * Math.PI / 180 * R * Math.cos(currentClickLat * Math.PI / 180);
                        const dy = (glat - currentClickLat) * Math.PI / 180 * R;
                        gridPoints.push({ x: dx, y: dy });
                    }
                }

                const btn = document.getElementById('sendBtn');
                btn.innerText = "지형 표고 수집중... ⛰️";
                
                const elevUrl = `https://api.open-meteo.com/v1/elevation?latitude=${gridLats.join(',')}&longitude=${gridLngs.join(',')}`;
                const elevRes = await fetch(elevUrl);
                
                if (elevRes.ok) {
                    const elevData = await elevRes.json();
                    if (elevData.elevation && elevData.elevation.length === gridSize * gridSize) {
                        const centerIdx = Math.floor(gridSize/2) * gridSize + Math.floor(gridSize/2);
                        const baseElev = elevData.elevation[centerIdx];
                        
                        terrainPayload = {
                            gridSize: gridSize,
                            points: gridPoints.map((p, idx) => ({
                                x: p.x,
                                y: p.y,
                                z: elevData.elevation[idx] - baseElev
                            }))
                        };
                    }
                }
            } catch (err) {
                console.error("지형 표고 데이터 수집 실패:", err);
            }

            // 최종 payload 생성 (지형, 건물, 위성지도, 도로 포함)
            const payload = {
                buildings: localBuildings,
                roads: localRoads,
                map: mapPayload,
                terrain: terrainPayload
            };

            const btn = document.getElementById('sendBtn');
            const originalText = btn.innerText;
            btn.innerText = "전송 중... ⏳";
            
            try {
                const response = await fetch('http://localhost:4567/build', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(response.ok) {
                    showLog(`✅ 건/도로 ${localBuildings.length + localRoads.length}개 전송 완료!`, "#4CAF50");
                } else {
                    showLog("⚠️ 스케치업 서버 응답 오류", "#E34F26");
                }
            } catch (error) {
                showLog("❌ 통신 실패. 스케치업 서버(skp_server.rb)가 켜져있나요?", "#E34F26");
            } finally {
                btn.innerText = originalText;
            }
        }

        function showLog(msg, color) {
            const logEl = document.getElementById('log');
            logEl.innerText = msg;
            logEl.style.color = color;
            setTimeout(() => {
                if (logEl.innerText === msg) logEl.innerText = "";
            }, 3000);
        }
        
        function enableButton() {
            const btn = document.getElementById('sendBtn');
            btn.disabled = false;
            btn.classList.add('active');
        }
        
        function disableButton() {
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.classList.remove('active');
            
            document.getElementById('selectedCount').innerText = "0개";
        }

        function goToMergedApp() {
            if (currentBuildings.length === 0) {
                return showLog("선택된 건물 데이터가 없습니다. 지도에서 클릭하거나 AI/맵 배치를 통해 건물을 생성하세요.", "#E34F26");
            }
            const localBuildings = convertToLocalMetersList(currentBuildings, currentClickLng, currentClickLat);
            localStorage.setItem('planBuildings', JSON.stringify(localBuildings));
            window.open('merged_app.html', '_blank');
        }
    </script>
</body>
</html>
