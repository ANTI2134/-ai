    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            900: '#0F172A',
                            800: '#1E293B',
                            700: '#334155',
                            600: '#475569',
                        },
                        primary: {
                            500: '#8B5CF6',
                            600: '#7C3AED',
                        }
                    },
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- DXF Parser (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.2); border-radius: 10px; }
        .image-preview-ratio { aspect-ratio: 4/3; }
    </style>
</head>

    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-600/20 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-blue-600/20 blur-[120px] pointer-events-none"></div>

            <svg class="w-8 h-8 text-primary-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
            ArchIntelligence 비주얼라이저
        </h1>
        
        <!-- Local Testing API Key Input -->
        <div class="flex items-center gap-3">
            <span class="text-xs text-yellow-500 font-medium whitespace-nowrap hidden sm:inline-block">로컬 모드</span>
            <input type="password" id="api-key-input" placeholder="Gemini API 키를 입력하세요..." class="w-64 bg-dark-800 border-b border-gray-600 focus:border-primary-500 bg-transparent px-3 py-1.5 text-sm focus:outline-none transition-colors text-white placeholder-gray-500 shadow-inner">
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 custom-scrollbar z-10">
        
        <div class="lg:col-span-5 flex flex-col gap-6">
            <section class="glass-panel p-6 rounded-2xl flex flex-col gap-4">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    <span class="w-8 h-8 rounded bg-primary-500/20 text-primary-400 flex items-center justify-center">1</span> 
                    2D 도면 업로드
                </h2>
                
                <div id="drop-zone" class="relative group cursor-pointer border-2 border-dashed border-gray-600 hover:border-primary-500 rounded-xl bg-dark-800/50 hover:bg-dark-800/80 transition-all duration-300 image-preview-ratio flex flex-col items-center justify-center overflow-hidden">
                    <input type="file" id="file-input" accept="image/*,.dxf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                    <div id="upload-placeholder" class="text-center p-6 flex flex-col items-center gap-3 transition-opacity duration-300">

                            <svg class="w-8 h-8 text-gray-400 group-hover:text-primary-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>

                            </div>
                        </div>
                        <button onclick="runColoring()" id="btn-coloring" class="mt-2 w-full py-2 px-3 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-semibold rounded-lg transition-all text-sm flex justify-center items-center gap-2">

                    <!-- Step 3: Isometric -->
                    <div class="flex flex-col gap-3 p-4 bg-dark-800/20 border border-white/5 rounded-xl transition-all duration-300 opacity-50 grayscale pointer-events-none relative" id="card-isometric">
                        <div class="text-sm font-bold text-teal-400 flex items-center justify-between gap-2">

                        <div class="grid grid-cols-2 gap-3">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-xs font-semibold text-gray-300 uppercase tracking-wider">컨셉</label>

        <div class="lg:col-span-7 flex flex-col h-[calc(100vh-140px)] min-h-[600px]">

                <div class="absolute top-4 left-6 z-20 flex items-center gap-2 bg-dark-900/60 backdrop-blur pb-1 px-3 py-1.5 rounded-full border border-white/5">
                    <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                    <span class="text-xs font-medium uppercase tracking-wider text-gray-200">AI 결과 뷰어</span>

                <div id="result-container" class="w-full h-full rounded-xl bg-dark-900/80 flex items-center justify-center relative overflow-hidden group">
                    <div id="result-idle" class="flex flex-col items-center justify-center text-center p-8 absolute inset-0">
                        <svg class="w-20 h-20 text-gray-700 mb-4 animate-float" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        <h3 class="text-xl font-medium text-gray-500">생성 대기 중</h3>
                        <p class="text-sm text-gray-600">도면을 업로드하고 API 키를 입력한 뒤 시작하세요.</p>
                    </div>

                    <div id="result-loading" class="flex flex-col items-center justify-center bg-dark-900/90 backdrop-blur-sm z-30 absolute inset-0 opacity-0 pointer-events-none transition-opacity">

                            <div class="absolute inset-0 border-t-2 border-primary-500 rounded-full animate-spin"></div>

                        </div>

                    </div>

                    <img id="result-image" src="" alt="Result" class="absolute inset-0 w-full h-full object-contain p-4 opacity-0 pointer-events-none z-20 transition-all">

                </div>

                <div id="result-toolbar" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-3 glass-panel px-4 py-2 rounded-full opacity-0 pointer-events-none transition-all group-hover:opacity-100 z-40">
                    <button onclick="downloadImage()" class="p-2 text-gray-300 hover:text-white hover:bg-white/10 rounded-full transition-colors flex items-center justify-center" aria-label="Download">다운로드</button>
                    <button onclick="resetResult()" class="p-2 text-gray-300 hover:text-red-400 hover:bg-white/10 rounded-full transition-colors flex items-center justify-center" aria-label="Clear">초기화</button>

    <div id="toast" class="fixed bottom-6 right-6 glass-panel border-[#ef4444] border-l-4 px-6 py-4 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        <svg class="w-6 h-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <div>
            <h4 class="text-sm font-semibold text-white">알림</h4>
            <p id="toast-msg" class="text-xs text-gray-300 mt-0.5">문제가 발생했습니다.</p>
        </div>
    </div>

    <script>
        let currentBase64Image = null;
        let pipelineState = { zoningImage: null, coloringImage: null };

        const fileInput = document.getElementById('file-input');
        const imagePreview = document.getElementById('image-preview');
        const uploadPlaceholder = document.getElementById('upload-placeholder');
        const optionsPanel = document.getElementById('options-panel');
        
        // Tabs logic removed as it is now a unified scrolling form

        fileInput.addEventListener('change', (e) => {
            if(e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
        });
        
        function resetPipelineStates() {
            pipelineState = { zoningImage: null, coloringImage: null };
            document.getElementById('card-coloring').classList.add('opacity-50', 'grayscale', 'pointer-events-none');
            document.getElementById('card-coloring').classList.remove('ring-1', 'ring-blue-500/30', 'shadow-[0_0_15px_rgba(59,130,246,0.1)]');
            document.getElementById('card-isometric').classList.add('opacity-50', 'grayscale', 'pointer-events-none');
            document.getElementById('card-isometric').classList.remove('ring-1', 'ring-teal-500/30', 'shadow-[0_0_15px_rgba(20,184,166,0.1)]');
            
            document.getElementById('btn-zoning').innerHTML = "조닝 맵 생성하기";
            document.getElementById('btn-coloring').innerHTML = "재질 적용하기";
            document.getElementById('btn-isometric').innerHTML = "3D 렌더링하기";

            document.getElementById('btn-download-dxf').classList.add('hidden');
            document.getElementById('btn-download-dxf').classList.remove('flex');
        }

        function handleFile(file) {
            const isDxf = file.name.toLowerCase().endsWith('.dxf');
            if(!file.type.startsWith('image/') && !isDxf) return showToast('이미지 또는 DXF 파일을 업로드해주세요.');
            
            const reader = new FileReader();
            reader.onload = (e) => {
                if (isDxf) {
                    try {
                        const dxfText = e.target.result;
                        const parser = new DxfParser();
                        const dxf = parser.parseSync(dxfText);
                        currentBase64Image = renderDxfToImage(dxf);
                    } catch (err) {
                        console.error(err);
                        return showToast('DXF 파싱에 실패했습니다. 유효한 ASCII DXF 파일인지 확인해주세요.');
                    }
                } else {
                    currentBase64Image = e.target.result;
                }
                
                imagePreview.src = currentBase64Image;
                imagePreview.classList.remove('hidden');
                uploadPlaceholder.classList.add('opacity-0', 'pointer-events-none');
                optionsPanel.style.opacity = '1';
                optionsPanel.style.pointerEvents = 'auto';
                resetPipelineStates();
            };

            if (isDxf) reader.readAsText(file);
            else reader.readAsDataURL(file);
        }

        function renderDxfToImage(dxf) {
            // Find Bounding Box across all entities and blocks
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

            function updateBounds(x, y) {
                if (x < minX) minX = x; if (x > maxX) maxX = x;
                if (y < minY) minY = y; if (y > maxY) maxY = y;
            }

            function scanEntities(entities, transform) {
                entities.forEach(ent => {
                    const tx = transform ? transform.x : 0;
                    const ty = transform ? transform.y : 0;
                    const s = transform ? (transform.scale || 1) : 1;
                    
                    if (ent.type === 'LINE' || ent.type === 'LWPOLYLINE' || ent.type === 'POLYLINE') {
                        ent.vertices.forEach(v => updateBounds(tx + v.x * s, ty + v.y * s));
                    } else if (ent.type === 'CIRCLE' || ent.type === 'ARC') {
                        updateBounds(tx + (ent.center.x - ent.radius) * s, ty + (ent.center.y - ent.radius) * s);
                        updateBounds(tx + (ent.center.x + ent.radius) * s, ty + (ent.center.y + ent.radius) * s);
                    } else if (ent.type === 'INSERT') {
                        const block = dxf.blocks[ent.name];
                        if (block && block.entities) {
                            scanEntities(block.entities, { x: tx + ent.x * s, y: ty + ent.y * s, scale: s * (ent.xScale || 1) });
                        }
                    }
                });
            }

            scanEntities(dxf.entities);
            if (minX === Infinity) { minX = 0; minY = 0; maxX = 1000; maxY = 1000; }

            const width = maxX - minX;
            const height = maxY - minY;
            const padding = Math.max(width, height) * 0.05;
            
            const canvas = document.createElement('canvas');
            const targetSize = 2048;
            const scale = (targetSize - 200) / Math.max(width, height);
            canvas.width = targetSize;
            canvas.height = targetSize;
            
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#222222';
            ctx.lineWidth = 1.5;

            function drawEntities(entities, transform) {
                entities.forEach(ent => {
                    const tx = transform ? transform.x : 0;
                    const ty = transform ? transform.y : 0;
                    const s = transform ? (transform.scale || 1) : 1;

                    ctx.beginPath();
                    if (ent.type === 'LINE' || ent.type === 'LWPOLYLINE' || ent.type === 'POLYLINE') {
                        if (!ent.vertices || ent.vertices.length < 2) return;
                        const v0 = ent.vertices[0];
                        ctx.moveTo((tx + v0.x * s - minX) * scale + 100, canvas.height - ((ty + v0.y * s - minY) * scale + 100));
                        for(let i=1; i<ent.vertices.length; i++){
                            const v = ent.vertices[i];
                            ctx.lineTo((tx + v.x * s - minX) * scale + 100, canvas.height - ((ty + v.y * s - minY) * scale + 100));
                        }
                        if (ent.shape) ctx.closePath();
                    } else if (ent.type === 'CIRCLE') {
                        const cx = (tx + ent.center.x * s - minX) * scale + 100;
                        const cy = canvas.height - ((ty + ent.center.y * s - minY) * scale + 100);
                        ctx.arc(cx, cy, ent.radius * s * scale, 0, 2 * Math.PI);
                    } else if (ent.type === 'ARC') {
                        const cx = (tx + ent.center.x * s - minX) * scale + 100;
                        const cy = canvas.height - ((ty + ent.center.y * s - minY) * scale + 100);
                        // DXF angles are counter-clockwise, Canvas angles also, but Y is flipped
                        const start = -ent.startAngle * Math.PI / 180;
                        const end = -ent.endAngle * Math.PI / 180;
                        ctx.arc(cx, cy, ent.radius * s * scale, start, end, true);
                    } else if (ent.type === 'INSERT') {
                        const block = dxf.blocks[ent.name];
                        if (block && block.entities) {
                            drawEntities(block.entities, { x: tx + ent.x * s, y: ty + ent.y * s, scale: s * (ent.xScale || 1) });
                        }
                        return;
                    }
                    ctx.stroke();
                });
            }

            drawEntities(dxf.entities);
            return canvas.toDataURL('image/jpeg', 0.9);
        }

        async function callGeminiImageGen(prompt, base64Input, apiKey) {
            const mimeType = base64Input.startsWith('data:') ? base64Input.split(';')[0].split(':')[1] : "image/png";
            const cleanBase64 = base64Input.includes(',') ? base64Input.split(',')[1] : base64Input;
            
            const genPayload = {
                contents: [ 
                    { 
                        role: 'user', 
                        parts: [ 
                            { text: prompt }, 
                            { inlineData: { mimeType: mimeType, data: cleanBase64 } } 
                        ] 
                    } 
                ],
                generationConfig: { responseModalities: ["IMAGE"] }
            };

            const targetModel = "gemini-3.1-flash-image-preview";
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(genPayload)
            });

            const result = await response.json();
            if(!response.ok) throw new Error(result.error?.message || 'API request failed');

            const parts = result.candidates?.[0]?.content?.parts || [];
            let generatedImageBase64 = null;
            for(const part of parts) {
                if(part.inlineData) {
                    generatedImageBase64 = `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;
                }
            }

            if(!generatedImageBase64) throw new Error("API succeeded but returned no Image Data.");
            return generatedImageBase64;
        }

        function showPipelineUI(text, progress) {
            setResultState('loading');
            const statusBox = document.getElementById('pipeline-status');
            statusBox.classList.remove('hidden');
            statusBox.classList.add('flex');
            document.getElementById('pipeline-text').innerText = text;
            document.getElementById('pipeline-progress').style.width = progress + "%";
        }
        
        function hidePipelineUIAndShowImage(elImg) {
            setResultState('success');
            setTimeout(() => {
                document.getElementById('pipeline-status').classList.add('hidden');
                document.getElementById('pipeline-status').classList.remove('flex');
                elImg.classList.remove('opacity-0', 'pointer-events-none');
                document.getElementById('result-toolbar').classList.remove('opacity-0', 'pointer-events-none');
            }, 300);
        }
        
        function handlePipelineError(error) {
            console.error(error);
            setResultState('idle');
            document.getElementById('pipeline-status').classList.add('hidden');
            document.getElementById('pipeline-status').classList.remove('flex');
            document.getElementById('pipeline-progress').style.width = "0%";
            showToast(error.message);
        }

        async function runZoning() {
            const apiKey = document.getElementById('api-key-input').value.trim();
            if(!apiKey) return showToast('API 키가 필요합니다.');
            if(!currentBase64Image) return showToast('먼저 도면을 업로드해주세요.');

            // If user re-runs Zoning, discard future steps
            pipelineState.coloringImage = null;
            document.getElementById('card-coloring').classList.add('opacity-50', 'grayscale', 'pointer-events-none');
            document.getElementById('card-isometric').classList.add('opacity-50', 'grayscale', 'pointer-events-none');
            const btn = document.getElementById('btn-zoning');
            btn.innerHTML = `<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> 조닝 중...`;
            showPipelineUI("1단계: 컨셉 조닝 맵 생성 중...", 33);
            
            try {
                const promptZoning = `Generate a conceptual top-down architectural zoning map based exactly on the layout of this uploaded 2D floor plan. Accommodate a layout containing: ${document.getElementById('zoning-rooms').value || 'Lobby, Restroom, Consulting'}. Show distinct solid colored zones overlayed on the structural walls.`;
                const result = await callGeminiImageGen(promptZoning, currentBase64Image, apiKey);
                
                pipelineState.zoningImage = result;
                const elImg = document.getElementById('result-image');
                elImg.src = result;
                elImg.onload = () => {
                    hidePipelineUIAndShowImage(elImg);
                    btn.innerHTML = "조닝 재생성";
                    
                    // Show DXF Download Button
                    document.getElementById('btn-download-dxf').classList.remove('hidden');
                    document.getElementById('btn-download-dxf').classList.add('flex');
                    
                    // Unlock Step 2
                    const card2 = document.getElementById('card-coloring');
                    card2.classList.remove('opacity-50', 'grayscale', 'pointer-events-none');
                    card2.classList.add('ring-1', 'ring-blue-500/30', 'shadow-[0_0_15px_rgba(59,130,246,0.1)]');
                };
            } catch (error) {
                btn.innerHTML = "Generate Zoning Map";
                handlePipelineError(error);
            }
        }

        function downloadZoningDXF() {
            if (!pipelineState.zoningImage) return showToast("Zoning Image must be generated first.");
            
            const img = new Image();
            img.src = pipelineState.zoningImage;
            img.onload = () => {
                const w = img.width;
                const h = img.height;
                // Generate minimalist AutoCAD R12 DXF with a bounding box for standard drawing frame
                const dxfString = `  0\nSECTION\n  2\nHEADER\n  9\n$ACADVER\n  1\nAC1009\n  0\nENDSEC\n  0\nSECTION\n  2\nENTITIES\n  0\nLINE\n  8\nAI_ZONING_BOUNDS\n 10\n0.0\n 20\n0.0\n 30\n0.0\n 11\n${w}\n 21\n0.0\n 31\n0.0\n  0\nLINE\n  8\nAI_ZONING_BOUNDS\n 10\n${w}\n 20\n0.0\n 30\n0.0\n 11\n${w}\n 21\n${h}\n 31\n0.0\n  0\nLINE\n  8\nAI_ZONING_BOUNDS\n 10\n${w}\n 20\n${h}\n 30\n0.0\n 11\n0.0\n 21\n${h}\n 31\n0.0\n  0\nLINE\n  8\nAI_ZONING_BOUNDS\n 10\n0.0\n 20\n${h}\n 30\n0.0\n 11\n0.0\n 21\n0.0\n 31\n0.0\n  0\nENDSEC\n  0\nEOF`;
                
                // Trigger DXF Download
                const blobDXF = new Blob([dxfString], { type: 'text/plain' });
                const urlDXF = URL.createObjectURL(blobDXF);
                const aDXF = document.createElement('a');
                aDXF.href = urlDXF;
                aDXF.download = 'AI_Zoning_Underlay.dxf';
                aDXF.click();
                URL.revokeObjectURL(urlDXF);
                
                // Trigger Image Download (To be dragged into CAD bounds)
                setTimeout(() => {
                    const aImg = document.createElement('a');
                    aImg.href = pipelineState.zoningImage;
                    aImg.download = 'AI_Zoning_Map.jpg';
                    aImg.click();
                    showToast("DXF와 이미지를 다운로드했습니다. AutoCAD에서 DXF 영역 안으로 이미지를 드래그하세요.");
                }, 500);
            };
        }

        async function runColoring() {
            const apiKey = document.getElementById('api-key-input').value.trim();
            if(!apiKey || !pipelineState.zoningImage) return;

            // If user re-runs Coloring, discard Isometric
            document.getElementById('card-isometric').classList.add('opacity-50', 'grayscale', 'pointer-events-none');
            const btn = document.getElementById('btn-coloring');
            btn.innerHTML = `<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> 적용 중...`;
            showPipelineUI("2단계: 조닝 맵에 실사 재질 매핑 중...", 66);
            
            try {
                const promptColoring = `Generate a beautifully textured, strictly realistic photorealistic top-down architectural presentation plan by transforming this layout image. Apply a ${document.getElementById('color-style').value || 'Minimalist'} style with ${document.getElementById('color-floor').value || 'Light Oak'} floors. Map all lights and shadows exactly to the structural lines.`;
                const result = await callGeminiImageGen(promptColoring, pipelineState.zoningImage, apiKey); 
                
                pipelineState.coloringImage = result;
                const elImg = document.getElementById('result-image');
                elImg.src = result;
                elImg.onload = () => {
                    hidePipelineUIAndShowImage(elImg);
                    btn.innerHTML = "재질 재적용";
                    
                    // Unlock Step 3
                    const card3 = document.getElementById('card-isometric');
                    card3.classList.remove('opacity-50', 'grayscale', 'pointer-events-none');
                    card3.classList.add('ring-1', 'ring-teal-500/30', 'shadow-[0_0_15px_rgba(20,184,166,0.1)]');
                };
            } catch (error) {
                btn.innerHTML = "Apply Materials";
                handlePipelineError(error);
            }
        }

        async function runIsometric() {
            const apiKey = document.getElementById('api-key-input').value.trim();
            if(!apiKey || !pipelineState.coloringImage) return;
 
            const btn = document.getElementById('btn-isometric');
            btn.innerHTML = `<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> 렌더링 중...`;
            showPipelineUI("3단계: 컬러 맵을 3D 아이소메트릭으로 변환 중...", 100);
            
            try {
                const promptIsometric = `Transform this colored top-down mapping into a precise 3D Isometric rendering. 
[Perspective & View]: Isometric 3D cutaway view, 45-degree top-right angle (dollhouse perspective), no roof showing full interior. 
[Subject & Structure]: ${document.getElementById('iso-concept')?.value || 'Modern Korean apartment'} interior. 2600mm wall height. Dark charcoal load-bearing walls contrasting with ${document.getElementById('iso-wall')?.value || 'creamy white textured'} partition walls. 
[Rendering Style]: Ultra-photorealistic architectural CGI, Octane & V-Ray render quality, 8K resolution, professional presentation. 
[Materials & Lighting]: PBR realistic materials (${document.getElementById('color-floor')?.value || 'natural oak'} flooring, fabric, glass). Natural sunlight streaming in, soft shadows cast on a clean neutral gray background plane.`;
                
                const result = await callGeminiImageGen(promptIsometric, pipelineState.coloringImage, apiKey); 
                
                const elImg = document.getElementById('result-image');
                elImg.src = result;
                elImg.onload = () => {
                    hidePipelineUIAndShowImage(elImg);
                    btn.innerHTML = "3D 재렌더링";
                };
            } catch (error) {
                btn.innerHTML = "Render 3D";
                handlePipelineError(error);
            }
        }

        function setResultState(state) {
            document.getElementById('result-idle').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('result-loading').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('result-image').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('result-text').classList.add('opacity-0', 'pointer-events-none', 'hidden');
            document.getElementById('result-toolbar').classList.add('opacity-0', 'pointer-events-none');

            if(state === 'idle') document.getElementById('result-idle').classList.remove('opacity-0', 'pointer-events-none');
            if(state === 'loading') document.getElementById('result-loading').classList.remove('opacity-0', 'pointer-events-none');
        }

        function resetResult() {
            setResultState('idle');
        }

        function downloadImage() {
            const elImage = document.getElementById('result-image');
            if(elImage.src && elImage.src.startsWith('data:')) {
                const a = document.createElement('a');
                a.href = elImage.src;
                a.download = `architecture_render_${new Date().getTime()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 4000);
        }
    </script>
